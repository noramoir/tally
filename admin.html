<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎲 Tally Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style>
    :root { --bg: #1a1a2e; --card: #16213e; --accent: #F06038; --text: #e0e0e0; --muted: #888; --border: #333; --green: #2ecc71; --red: #e74c3c; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; padding: 20px; }
    h1 { color: var(--accent); margin-bottom: 8px; }
    h2 { color: var(--accent); margin: 24px 0 12px; font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .container { max-width: 900px; margin: 0 auto; }
    .login-box { max-width: 400px; margin: 100px auto; background: var(--card); padding: 32px; border-radius: 12px; border: 1px solid var(--border); }
    input, select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 14px; font-family: inherit; width: 100%; margin-bottom: 12px; }
    button { background: var(--accent); color: white; border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 700; }
    button:hover { opacity: 0.9; }
    button.secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    button.danger { background: var(--red); }
    button.small { padding: 6px 12px; font-size: 12px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
    .badge-green { background: var(--green); color: #000; }
    .badge-red { background: var(--red); color: #fff; }
    .badge-muted { background: var(--border); color: var(--muted); }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
    th { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    .flex { display: flex; gap: 8px; align-items: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab { padding: 8px 16px; border-radius: 6px 6px 0 0; cursor: pointer; font-weight: 700; font-size: 13px; border: 1px solid var(--border); border-bottom: none; }
    .tab-active { background: var(--card); color: var(--accent); }
    .tab-inactive { background: var(--bg); color: var(--muted); }
    .status { padding: 8px 12px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
    .status-ok { background: #1a3a2a; color: var(--green); border: 1px solid var(--green); }
    .status-err { background: #3a1a1a; color: var(--red); border: 1px solid var(--red); }
    .json-editor { width: 100%; min-height: 200px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 12px; font-family: inherit; resize: vertical; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mb-8 { margin-bottom: 8px; }
    .text-muted { color: var(--muted); font-size: 12px; }
    .tier-select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 13px; font-family: inherit; width: auto; margin-bottom: 0; cursor: pointer; }
    .tier-shield { display: inline-block; width: 28px; height: 28px; line-height: 28px; text-align: center; border-radius: 50% 50% 40% 40%; font-size: 13px; font-weight: 900; border: 2px solid var(--border); }
    .tier-1 { background: #aaa; color: #fff; } .tier-2 { background: #4e9af1; color: #fff; }
    .tier-3 { background: #f0a500; color: #fff; } .tier-4 { background: #e05; color: #fff; }
    .tier-5 { background: #7c3aed; color: #fff; }
  </style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ─── Admin Config ────────────────────────────────
// Set your admin password here (plain text for now, only you access this page)
const ADMIN_PASSWORD = "admin123"; // CHANGE THIS!

// ─── Supabase ────────────────────────────────────
let sb = null;
try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON); } catch(e) {}

async function dbLoad(c) { if (!sb) return null; try { const { data } = await sb.from("family_games").select("games").eq("family_code", c).single(); return data?.games || null; } catch { return null; } }
async function dbSave(c, g) { if (!sb) return; try { await sb.from("family_games").upsert({ family_code: c, games: g, updated_at: new Date().toISOString() }, { onConflict: "family_code" }); } catch {} }
async function dbListAll() { if (!sb) return []; try { const { data } = await sb.from("family_games").select("family_code,games,updated_at").order("updated_at", { ascending: false }); return data || []; } catch { return []; } }

// New table queries
async function dbNewUsers() { if (!sb) return []; try { const { data } = await sb.from("tally_users").select("*").order("created_at", { ascending: false }); return data || []; } catch { return []; } }
async function dbNewFamilies() { if (!sb) return []; try { const { data } = await sb.from("tally_families").select("*").order("created_at", { ascending: false }); return data || []; } catch { return []; } }
async function dbNewGames(familyId) { if (!sb) return []; try { const { data } = await sb.from("tally_games").select("*").eq("family_id", familyId).order("finished_at", { ascending: false, nullsFirst: false }); return data || []; } catch { return []; } }
async function dbNewTemplates(familyId) { if (!sb) return []; try { const { data } = await sb.from("tally_templates").select("*").eq("family_id", familyId); return data || []; } catch { return []; } }
async function dbNewMembers(familyId) { if (!sb) return []; try { const { data } = await sb.from("tally_family_members").select("*, tally_users(username)").eq("family_id", familyId); return data || []; } catch { return []; } }

// ─── State ───────────────────────────────────────
let loggedIn = false;
let allData = [];
let tab = "overview";
let status = null;
let editingKey = null;
let editJson = "";
let weightsFamilies = [];  // [{id, code}]
let weightsTemplates = {}; // familyId -> [{id, template_key, name, emoji, tier, ...}]
let weightsGames = {};     // familyId -> [{id, original_id, game_name, game_key, tier, finished, finished_at, ...}]
let weightsLoaded = false;
let weightsExpanded = {};  // `${familyId}:${templateKey}` -> bool

// ─── Render ──────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (!loggedIn) {
    app.innerHTML = `
      <div class="login-box">
        <h1>🎲 Tally Admin</h1>
        <p class="text-muted mb-8">Enter admin password to continue.</p>
        <input type="password" id="pw" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button onclick="doLogin()" style="width:100%">Log In →</button>
        <div id="login-err" style="color:var(--red);font-size:13px;margin-top:8px"></div>
      </div>
    `;
    return;
  }

  const users = allData.filter(r => r.family_code.startsWith("user_"));
  const families = allData.filter(r => !r.family_code.startsWith("user_") && !r.family_code.includes("_templates") && !r.family_code.includes("_users"));
  const templates = allData.filter(r => r.family_code.endsWith("_templates"));
  const familyUsers = allData.filter(r => r.family_code.endsWith("_users") && !r.family_code.startsWith("user_"));

  let content = "";
  const statusHtml = status ? `<div class="status ${status.ok ? 'status-ok' : 'status-err'}">${status.msg}</div>` : "";

  if (tab === "overview") {
    content = `
      ${statusHtml}
      <div class="card">
        <div class="flex-between"><span>Total records in database</span><span style="font-size:24px;font-weight:900;color:var(--accent)">${allData.length}</span></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="card"><div style="font-size:24px;font-weight:900;color:var(--accent)">${users.length}</div><div class="text-muted">User Accounts</div></div>
        <div class="card"><div style="font-size:24px;font-weight:900;color:var(--accent)">${families.length}</div><div class="text-muted">Family Spaces</div></div>
        <div class="card"><div style="font-size:24px;font-weight:900;color:var(--accent)">${templates.length}</div><div class="text-muted">Template Sets</div></div>
        <div class="card"><div style="font-size:24px;font-weight:900;color:var(--accent)">${familyUsers.length}</div><div class="text-muted">Family User Maps</div></div>
      </div>
    `;
  }

  else if (tab === "users") {
    let rows = users.map(u => {
      const d = u.games || {};
      const uid = u.family_code.replace("user_", "");
      const pinStatus = d.pin ? (d.pin.length === 64 ? '<span class="badge badge-green">hashed</span>' : '<span class="badge badge-red">plain</span>') : '<span class="badge badge-muted">none</span>';
      const fams = (d.families || []).join(", ") || "—";
      return `<tr>
        <td><strong>${uid}</strong></td>
        <td>${d.displayName || uid}</td>
        <td>${pinStatus}</td>
        <td style="font-size:11px">${fams}</td>
        <td>${d.createdAt ? new Date(d.createdAt).toLocaleDateString() : "—"}</td>
        <td><button class="small secondary" onclick="editRecord('${u.family_code}')">Edit</button> <button class="small danger" onclick="resetPinFor('${uid}')">🔑</button></td>
      </tr>`;
    }).join("");
    content = `
      ${statusHtml}
      <div class="flex-between mb-8">
        <p class="text-muted">${users.length} registered users</p>
        <button class="small" onclick="resetPin()">🔑 Reset a PIN</button>
      </div>
      <table><thead><tr><th>Username</th><th>Display</th><th>PIN</th><th>Families</th><th>Created</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    `;
  }

  else if (tab === "families") {
    let rows = families.map(f => {
      const games = Array.isArray(f.games) ? f.games : [];
      const finished = games.filter(g => g.finished).length;
      return `<tr>
        <td><strong>${f.family_code}</strong></td>
        <td>${games.length} total / ${finished} finished</td>
        <td style="font-size:11px">${f.updated_at ? new Date(f.updated_at).toLocaleDateString() : "—"}</td>
        <td>
          <button class="small secondary" onclick="editRecord('${f.family_code}')">Edit</button>
          <button class="small secondary" onclick="viewGames('${f.family_code}')">Games</button>
        </td>
      </tr>`;
    }).join("");
    content = `
      ${statusHtml}
      <p class="text-muted mb-8">${families.length} family spaces</p>
      <table><thead><tr><th>Family Code</th><th>Games</th><th>Updated</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    `;
  }

  else if (tab === "templates") {
    let rows = templates.map(t => {
      const d = t.games || {};
      const count = Object.keys(d).length;
      const names = Object.values(d).map(v => `${v.emoji || "🎲"} ${v.name || v.gameName || "?"}`).join(", ");
      return `<tr>
        <td><strong>${t.family_code.replace("_templates","")}</strong></td>
        <td>${count} games</td>
        <td style="font-size:11px;max-width:300px;overflow:hidden;text-overflow:ellipsis">${names}</td>
        <td><button class="small secondary" onclick="editRecord('${t.family_code}')">Edit</button></td>
      </tr>`;
    }).join("");
    content = `
      ${statusHtml}
      <p class="text-muted mb-8">${templates.length} template sets. Edit to change tiers, categories, game names.</p>
      <table><thead><tr><th>Family</th><th>Count</th><th>Games</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    `;
  }

  else if (tab === "newdb") {
    content = `
      ${statusHtml}
      <div class="card">
        <p class="text-muted mb-8">New structured tables (tally_*). Verify migration data here before switching the app.</p>
        <button class="small" onclick="loadNewDb()">🔍 Load New DB Data</button>
      </div>
      <div id="newdb-content"></div>
    `;
  }

  else if (tab === "weights") {
    if (!weightsLoaded) {
      content = `
        ${statusHtml}
        <div class="card">
          <p class="text-muted mb-8">Edit the tier (1–5) for each game template. Changes save immediately to the database and will be respected by the app on the next game start.</p>
          <button class="small" onclick="loadWeights()">🔍 Load Families & Templates</button>
        </div>
      `;
    } else if (weightsFamilies.length === 0) {
      content = `${statusHtml}<p class="text-muted">No families found.</p>`;
    } else {
      const tierLabels = { 1: "1 – Very Low", 2: "2 – Low", 3: "3 – Normal", 4: "4 – High", 5: "5 – Very High" };
      const tierOpts = [1,2,3,4,5].map(n => `<option value="${n}">${tierLabels[n]}</option>`).join("");
      let sections = weightsFamilies.map(fam => {
        const tpls = weightsTemplates[fam.id] || [];
        const games = (weightsGames[fam.id] || []).filter(g => g.finished);
        if (!tpls.length) return `<div class="card"><strong>${fam.code}</strong><span class="text-muted" style="margin-left:8px">No templates</span></div>`;
        const rows = tpls.map(t => {
          const tier = t.tier || 3;
          const opts = [1,2,3,4,5].map(n => `<option value="${n}"${n===tier?" selected":""}>${tierLabels[n]}</option>`).join("");
          // Match games by template_key — for built-in games tKey === game_key, for custom tKey === game_name
          const matched = games.filter(g => (g.game_key === t.template_key) || (g.game_key === "custom" && g.game_name === t.template_key));
          const expandKey = fam.id + ":" + t.template_key;
          const isOpen = !!weightsExpanded[expandKey];
          const gameRows = matched.map(g => {
            const gTier = g.tier || 3;
            const gOpts = [1,2,3,4,5].map(n => `<option value="${n}"${n===gTier?" selected":""}>${n}</option>`).join("");
            const date = g.finished_at ? new Date(g.finished_at).toLocaleDateString() : "—";
            const players = (g.players || []).map(p => p.name).join(", ");
            return `<tr>
              <td><span class="tier-shield tier-${gTier}" style="width:22px;height:22px;line-height:22px;font-size:11px">${gTier}</span></td>
              <td style="font-size:11px">${date}</td>
              <td style="font-size:11px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${players}</td>
              <td><select class="tier-select" onchange="saveGameTier('${fam.id}','${g.id}',this.value,'${fam.code}','${g.original_id}')">${gOpts}</select></td>
            </tr>`;
          }).join("");
          const subSection = matched.length === 0 ? "" : `
            <tr><td colspan="4" style="padding:0">
              <details ${isOpen?"open":""} style="margin:0;padding:8px 0 0 0">
                <summary style="cursor:pointer;font-size:11px;color:var(--muted);padding:4px 0" onclick="toggleExpand('${expandKey}')">
                  ▶ ${matched.length} game${matched.length===1?"":"s"} · <button class="small" style="padding:3px 8px;font-size:10px;margin-left:8px" onclick="event.preventDefault();event.stopPropagation();applyTemplateTierToGames('${fam.id}','${t.template_key}',${tier},'${fam.code}')">⚡ Apply T${tier} to all</button>
                </summary>
                <table style="margin-top:6px"><thead><tr><th style="font-size:10px">Tier</th><th style="font-size:10px">Date</th><th style="font-size:10px">Players</th><th style="font-size:10px">Change</th></tr></thead><tbody>${gameRows}</tbody></table>
              </details>
            </td></tr>`;
          return `<tr>
            <td><span class="tier-shield tier-${tier}">${tier}</span></td>
            <td>${t.emoji || "🎲"} <strong>${t.name}</strong></td>
            <td><code style="font-size:11px;color:var(--muted)">${t.template_key}</code></td>
            <td><select class="tier-select" onchange="saveTier('${fam.id}','${t.id}',this.value,'${fam.code}','${t.template_key}')">${opts}</select></td>
          </tr>${subSection}`;
        }).join("");
        return `
          <div class="card" style="margin-bottom:16px">
            <div class="flex-between mb-8"><strong style="font-size:15px">${fam.code}</strong><span class="text-muted">${tpls.length} templates · ${games.length} finished games</span></div>
            <table><thead><tr><th>Tier</th><th>Game</th><th>Key</th><th>Change</th></tr></thead><tbody>${rows}</tbody></table>
          </div>`;
      }).join("");
      content = `
        ${statusHtml}
        <div class="flex-between mb-8">
          <p class="text-muted">Template tier sets the default for new games. Expand a row to edit tiers on past games, or use <strong>⚡ Apply</strong> to push the template tier across all matching past games.</p>
          <button class="small secondary" onclick="loadWeights()">🔄 Refresh</button>
        </div>
        ${sections}
      `;
    }
  }

  else if (tab === "editor") {
    content = `
      ${statusHtml}
      <div class="flex-between mb-8">
        <div><strong>Editing:</strong> <code>${editingKey}</code></div>
        <div class="flex"><button class="small" onclick="saveEdit()">💾 Save</button><button class="small secondary" onclick="tab='overview';render()">Cancel</button></div>
      </div>
      <textarea class="json-editor" id="json-edit">${editJson}</textarea>
      <p class="text-muted mt-8">⚠️ Be careful with JSON formatting. Invalid JSON won't save.</p>
    `;
  }

  else if (tab === "games") {
    const fam = editingKey;
    const record = allData.find(r => r.family_code === fam);
    const games = Array.isArray(record?.games) ? record.games : [];
    let rows = games.map((g, i) => {
      const winner = g.players ? [...g.players].sort((a,b) => {
        const at = Object.values(a.scores||{}).reduce((s,v) => s+(parseFloat(v)||0), 0);
        const bt = Object.values(b.scores||{}).reduce((s,v) => s+(parseFloat(v)||0), 0);
        return g.lowWins ? at-bt : bt-at;
      })[0] : null;
      const wName = winner ? winner.name : "?";
      return `<tr>
        <td>${g.emoji || "🎲"} ${g.gameName || "Game"}</td>
        <td>${g.finished ? '<span class="badge badge-green">done</span>' : '<span class="badge badge-muted">active</span>'}</td>
        <td>${wName}</td>
        <td>${g.players ? g.players.map(p=>p.name).join(", ") : "—"}</td>
        <td style="font-size:11px">${g.finishedAt ? new Date(g.finishedAt).toLocaleDateString() : "—"}</td>
        <td>T${g.tier || 3}</td>
        <td><button class="small danger" onclick="deleteGame('${fam}',${g.id})">🗑</button></td>
      </tr>`;
    }).join("");
    content = `
      ${statusHtml}
      <div class="flex-between mb-8">
        <div><strong>${fam}</strong> — ${games.length} games</div>
        <button class="small secondary" onclick="tab='families';render()">← Back</button>
      </div>
      <table><thead><tr><th>Game</th><th>Status</th><th>Winner</th><th>Players</th><th>Date</th><th>Tier</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    `;
  }

  app.innerHTML = `
    <div class="flex-between" style="margin-bottom:20px">
      <h1>🎲 Tally Admin</h1>
      <div class="flex"><button class="small secondary" onclick="refreshData()">🔄 Refresh</button><button class="small secondary" onclick="loggedIn=false;render()">Logout</button></div>
    </div>
    <div class="tabs">
      ${["overview","users","families","templates","weights","newdb"].map(t =>
        `<div class="tab ${tab===t?'tab-active':'tab-inactive'}" onclick="tab='${t}';render()">${t==='newdb'?'New DB':t.charAt(0).toUpperCase()+t.slice(1)}</div>`
      ).join("")}
    </div>
    ${content}
  `;
}

// ─── Actions ─────────────────────────────────────
function doLogin() {
  const pw = document.getElementById("pw").value;
  if (pw === ADMIN_PASSWORD) {
    loggedIn = true;
    refreshData();
  } else {
    document.getElementById("login-err").textContent = "Wrong password";
  }
}

async function resetPin() {
  const username = prompt("Username to reset:");
  if (!username) return;
  const newPin = prompt("New PIN for " + username + " (4+ chars):");
  if (!newPin || newPin.length < 4) { alert("PIN must be 4+ chars"); return; }
  const encoder = new TextEncoder();
  const hash = await crypto.subtle.digest('SHA-256', encoder.encode(newPin));
  const pinHash = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  const { error } = await sb.from("tally_users").update({ pin_hash: pinHash }).eq("username", username.trim().toLowerCase());
  if (error) { alert("Error: " + error.message); return; }
  status = { ok: true, msg: "✅ PIN reset for " + username };
  render();
}

async function resetPinFor(username) {
  const newPin = prompt("New PIN for " + username + " (4+ chars):");
  if (!newPin || newPin.length < 4) { alert("PIN must be 4+ chars"); return; }
  const encoder = new TextEncoder();
  const hash = await crypto.subtle.digest('SHA-256', encoder.encode(newPin));
  const pinHash = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  const { error } = await sb.from("tally_users").update({ pin_hash: pinHash }).eq("username", username.trim().toLowerCase());
  if (error) { alert("Error: " + error.message); return; }
  status = { ok: true, msg: "✅ PIN reset for " + username };
  await refreshData();
}

async function refreshData() {
  status = { ok: true, msg: "Loading…" };
  render();
  allData = await dbListAll();
  status = { ok: true, msg: `Loaded ${allData.length} records` };
  render();
  setTimeout(() => { status = null; render(); }, 2000);
}

function editRecord(key) {
  const record = allData.find(r => r.family_code === key);
  editingKey = key;
  editJson = JSON.stringify(record?.games || {}, null, 2);
  tab = "editor";
  render();
}

async function saveEdit() {
  const textarea = document.getElementById("json-edit");
  try {
    const parsed = JSON.parse(textarea.value);
    await dbSave(editingKey, parsed);
    status = { ok: true, msg: `✅ Saved "${editingKey}"` };
    tab = "overview";
    await refreshData();
  } catch(e) {
    status = { ok: false, msg: `❌ Invalid JSON: ${e.message}` };
    render();
  }
}

function viewGames(familyCode) {
  editingKey = familyCode;
  tab = "games";
  render();
}

async function deleteGame(familyCode, gameId) {
  if (!confirm("Delete this game from history? This can't be undone.")) return;
  const record = allData.find(r => r.family_code === familyCode);
  if (!record || !Array.isArray(record.games)) return;
  const updated = record.games.filter(g => g.id !== gameId);
  await dbSave(familyCode, updated);
  status = { ok: true, msg: "Game deleted" };
  await refreshData();
  editingKey = familyCode;
  tab = "games";
  render();
}

async function loadNewDb() {
  const el = document.getElementById("newdb-content");
  el.innerHTML = "<p class='text-muted'>Loading...</p>";
  const [users, families] = await Promise.all([dbNewUsers(), dbNewFamilies()]);

  let html = `<h2>Users (${users.length})</h2><table><thead><tr><th>ID</th><th>Username</th><th>Display</th><th>PIN</th><th>Created</th></tr></thead><tbody>`;
  users.forEach(u => {
    const pinOk = u.pin_hash && u.pin_hash.length === 64;
    html += `<tr><td>${u.id}</td><td><strong>${u.username}</strong></td><td>${u.display_name}</td><td>${pinOk?'<span class="badge badge-green">hashed</span>':'<span class="badge badge-red">issue</span>'}</td><td style="font-size:11px">${new Date(u.created_at).toLocaleDateString()}</td></tr>`;
  });
  html += "</tbody></table>";

  html += `<h2>Families (${families.length})</h2>`;
  for (const f of families) {
    const [games, templates, members] = await Promise.all([dbNewGames(f.id), dbNewTemplates(f.id), dbNewMembers(f.id)]);
    html += `<div class="card"><div style="font-weight:900;font-size:16px;margin-bottom:8px">${f.code}</div>`;
    html += `<div class="text-muted">${members.length} members · ${games.length} games · ${templates.length} templates</div>`;
    if (members.length) {
      html += `<div style="margin-top:8px;font-size:12px"><strong>Members:</strong> ${members.map(m => m.display_name + (m.tally_users ? ' (@'+m.tally_users.username+')' : '')).join(", ")}</div>`;
    }
    if (templates.length) {
      html += `<div style="margin-top:4px;font-size:12px"><strong>Templates:</strong> ${templates.map(t => t.emoji+' '+t.name+' (T'+t.tier+')').join(", ")}</div>`;
    }
    if (games.length) {
      html += `<div style="margin-top:4px;font-size:12px"><strong>Games:</strong> ${games.filter(g=>g.finished).length} finished, ${games.filter(g=>!g.finished).length} active</div>`;
    }
    html += "</div>";
  }
  el.innerHTML = html;
}

// ─── Weights Tab ─────────────────────────────────
async function loadWeights() {
  status = { ok: true, msg: "Loading families…" };
  render();
  weightsFamilies = await dbNewFamilies();
  weightsTemplates = {};
  weightsGames = {};
  for (const fam of weightsFamilies) {
    const [tpls, games] = await Promise.all([dbNewTemplates(fam.id), dbNewGames(fam.id)]);
    weightsTemplates[fam.id] = tpls;
    weightsGames[fam.id] = games;
  }
  weightsLoaded = true;
  status = null;
  render();
}

async function saveTier(familyId, templateId, newTier, familyCode, templateKey) {
  const tier = parseInt(newTier, 10);
  if (!sb) { alert("Supabase not configured"); return; }
  const { error } = await sb.from("tally_templates").update({ tier }).eq("id", templateId);
  if (error) {
    status = { ok: false, msg: "❌ Failed to save: " + error.message };
  } else {
    const tpls = weightsTemplates[familyId] || [];
    const idx = tpls.findIndex(t => t.id === templateId);
    if (idx !== -1) tpls[idx] = Object.assign({}, tpls[idx], { tier });
    status = { ok: true, msg: `✅ ${familyCode} / ${templateKey} → Tier ${tier}` };
    setTimeout(() => { status = null; render(); }, 2000);
  }
  render();
}

async function saveGameTier(familyId, gameRowId, newTier, familyCode, originalId) {
  const tier = parseInt(newTier, 10);
  if (!sb) { alert("Supabase not configured"); return; }
  const { error } = await sb.from("tally_games").update({ tier }).eq("id", gameRowId);
  if (error) {
    status = { ok: false, msg: "❌ Failed to save: " + error.message };
  } else {
    const games = weightsGames[familyId] || [];
    const idx = games.findIndex(g => g.id === gameRowId);
    if (idx !== -1) games[idx] = Object.assign({}, games[idx], { tier });
    status = { ok: true, msg: `✅ ${familyCode} / game ${originalId} → Tier ${tier}` };
    setTimeout(() => { status = null; render(); }, 2000);
  }
  render();
}

function toggleExpand(key) {
  weightsExpanded[key] = !weightsExpanded[key];
  // <details> toggles itself; we just track state so re-renders preserve open/closed
}

async function applyTemplateTierToGames(familyId, templateKey, tier, familyCode) {
  if (!sb) { alert("Supabase not configured"); return; }
  const games = (weightsGames[familyId] || []).filter(g =>
    g.finished && (g.game_key === templateKey || (g.game_key === "custom" && g.game_name === templateKey))
  );
  if (!games.length) { alert("No matching games"); return; }
  if (!confirm(`Set tier ${tier} on ${games.length} past game${games.length===1?"":"s"} of "${templateKey}" in ${familyCode}? This overwrites individual game tiers.`)) return;
  status = { ok: true, msg: `Applying tier ${tier} to ${games.length} games…` };
  render();
  const ids = games.map(g => g.id);
  const { error } = await sb.from("tally_games").update({ tier }).in("id", ids);
  if (error) {
    status = { ok: false, msg: "❌ Failed: " + error.message };
  } else {
    games.forEach(g => { g.tier = tier; });
    weightsExpanded[familyId + ":" + templateKey] = true;
    status = { ok: true, msg: `✅ ${familyCode} / ${templateKey} → ${games.length} games set to T${tier}` };
    setTimeout(() => { status = null; render(); }, 3000);
  }
  render();
}

// ─── Init ────────────────────────────────────────
render();
</script>
